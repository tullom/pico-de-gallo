name: Upload Firmware Release Assets
on:
 push:
   tags:
     - "firmware-v*"
 pull_request:
   paths:
     - ".github/workflows/release-firmware.yml"
     - "crates/pico-de-gallo-firmware/**"
     - "crates/pico-de-gallo-internal/**"
 workflow_dispatch:

permissions:
 contents: write

jobs:
  create-release:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create new release
        uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prefix: "firmware"

  upload-firmware:
    # On PRs this job runs as a build-only smoke test (no upload). On tag
    # pushes / workflow_dispatch it gates on create-release and uploads the
    # produced artifacts to the release.
    needs: [create-release]
    if: ${{ !cancelled() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') }}

    runs-on: ubuntu-latest

    strategy:
      matrix:
        hw-rev: [rev1, rev2]
        include:
          - hw-rev: rev1
            feature-flags: ""
          - hw-rev: rev2
            feature-flags: "--no-default-features --features hw-rev2"

    steps:
      - name: Download pico-sdk-tools
        run: |
          curl -L -o picotool.tar.gz https://github.com/raspberrypi/pico-sdk-tools/releases/download/v2.2.0-2/picotool-2.2.0-a4-x86_64-lin.tar.gz

      - name: Install pico-sdk-tools
        run: |
          tar -vzxf picotool.tar.gz -C "$HOME"
          chmod +x "$HOME/picotool/picotool"
          echo "$HOME/picotool" >> "$GITHUB_PATH"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install stable rust
        uses: dtolnay/rust-toolchain@stable

      - name: rustup target add thumbv8m.main-none-eabihf
        run: rustup target add thumbv8m.main-none-eabihf

      - name: Build firmware (${{ matrix.hw-rev }})
        run: cargo build --release --locked --manifest-path crates/pico-de-gallo-firmware/Cargo.toml --target thumbv8m.main-none-eabihf ${{ matrix.feature-flags }}

      - name: Generate uf2
        run: |
          picotool uf2 convert crates/pico-de-gallo-firmware/target/thumbv8m.main-none-eabihf/release/pico-de-gallo-firmware -t elf firmware-${{ matrix.hw-rev }}.uf2

      - name: Upload uf2 to release
        if: github.event_name != 'pull_request'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: firmware-${{ matrix.hw-rev }}.uf2
          asset_name: firmware-${{ matrix.hw-rev }}.uf2
          tag: ${{ github.ref }}
          overwrite: true

      - name: Upload elf to release
        if: github.event_name != 'pull_request'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: crates/pico-de-gallo-firmware/target/thumbv8m.main-none-eabihf/release/pico-de-gallo-firmware
          asset_name: pico-de-gallo-firmware-${{ matrix.hw-rev }}
          tag: ${{ github.ref }}
          overwrite: true
